# feat-031 · OTel collector 示例 (Honeycomb)
# audit 事件 (target=openneon::audit) → Honeycomb dataset "openneon-audit"
# 普通 trace → Honeycomb dataset "openneon-trace"
#
# 用法: otelcol-contrib --config collector-honeycomb.yaml
# 需设 HONEYCOMB_API_KEY。

receivers:
  otlp:
    protocols:
      http:
        endpoint: 0.0.0.0:4318
      grpc:
        endpoint: 0.0.0.0:4317

processors:
  batch:
    timeout: 5s
    send_batch_size: 1024
  filter/audit:
    error_mode: ignore
    traces:
      span:
        - 'attributes["target"] != "openneon::audit"'
  filter/trace:
    error_mode: ignore
    traces:
      span:
        - 'attributes["target"] == "openneon::audit"'

exporters:
  otlp/honeycomb-audit:
    endpoint: api.honeycomb.io:443
    headers:
      x-honeycomb-team: ${env:HONEYCOMB_API_KEY}
      x-honeycomb-dataset: openneon-audit
  otlp/honeycomb-trace:
    endpoint: api.honeycomb.io:443
    headers:
      x-honeycomb-team: ${env:HONEYCOMB_API_KEY}
      x-honeycomb-dataset: openneon-trace

service:
  pipelines:
    traces/audit:
      receivers: [otlp]
      processors: [filter/audit, batch]
      exporters: [otlp/honeycomb-audit]
    traces/normal:
      receivers: [otlp]
      processors: [filter/trace, batch]
      exporters: [otlp/honeycomb-trace]
