# feat-061 · L1 day-one ship 端到端 fixture 自动化 (GitHub Actions · self-hosted runner · real Neon).
#
# Detail design: https://github.com/zlxtqbdgdgd/openneon-design/blob/main/features/feat-061-L1-cross-skill-e2e-fixture-ci-matrix.html
#
# Runs on a self-hosted runner on the maintainer dev server (per ADR-0004 Layer 2 · 0 secret in
# GitHub · runner connects local 127.0.0.1:55432 neon_local). Builds the PR code, starts an
# isolated server instance (CI port · NOT the persistent dev server's 3344), provisions the sales
# fixture, runs unit + e2e + real-Neon chain checks, then tears down.
#
# TRIGGER: auto on every main push + PR (+ manual workflow_dispatch). The `openneon-dev` self-hosted
# runner is registered + verified (run 26280281756 green · 2026-05-22). See README for runner ops.
#
# Implementation note (resolves detail design §11 OQ1/OQ3): single job · sequential checks. A single
# self-hosted runner serializes matrix jobs anyway, and a single job avoids fixture race entirely.
# Per-step PASS/FAIL is reported by run-checks.sh output. Refactor to GH matrix jobs (setup→matrix→
# teardown with `needs:`) only when multiple runners exist.

name: L1 e2e (real Neon · self-hosted)

on:
  # MANUAL-ONLY (workflow_dispatch). Auto-triggers (push:[main] + pull_request) removed 2026-06-02:
  # the self-hosted runner (openneon-dev) is STOPPED (#81), so every auto-run sits `queued` with no
  # runner forever → makes every PR's merge state `UNSTABLE` (noise · never green). Per the project
  # verification policy, CI is NOT the e2e gate — verification = dev-server direct e2e
  # (docs/agents/test-infra.md). Re-add `push:`/`pull_request:` here when the runner is back online.
  workflow_dispatch: {}

# CI server port · isolated from the persistent dev-server MCP server on 3344.
# NOTE: NEON_LOCAL_URL is intentionally NOT global · it short-circuits connection-string.ts
# (feat-062) · and the mocked unit tests (connection-string.test.ts) assert the non-bypassed
# Neon Cloud path. So NEON_LOCAL_URL is set ONLY on the "Start server" step (the server process
# that actually needs the bypass) · keeping it out of the unit-test step's env.
env:
  CI_PORT: '3355'
  MCP_BASE_URL: 'http://127.0.0.1:3355'

jobs:
  l1-e2e:
    # SECURITY (public repo + self-hosted runner): never run untrusted fork-PR code on the dev
    # server. Only same-repo refs reach the runner — push(main) + maintainer's own-branch PRs +
    # manual dispatch. Fork PRs skip here; review + merge them, then push(main) runs the gate.
    if: >-
      github.event_name != 'pull_request' ||
      github.event.pull_request.head.repo.full_name == github.repository
    runs-on: [self-hosted, openneon-dev]
    timeout-minutes: 15
    defaults:
      run:
        working-directory: landing
    steps:
      # dev server's HTTPS to github.com is flaky over HTTP/2 (RPC "HTTP2 framing layer" errors +
      # stream resets during checkout fetch). Force HTTP/1.1 + a big post-buffer so actions/checkout
      # below fetches reliably. Runs before checkout (needs no repo · just sets the runner's git).
      - name: Prefer HTTP/1.1 for git (dev server flaky HTTP/2 → github.com)
        # override job default working-directory (landing) · that subdir doesn't exist pre-checkout
        working-directory: ${{ github.workspace }}
        run: |
          git config --global http.version HTTP/1.1
          git config --global http.postBuffer 524288000

      # dev server's connectivity to github.com drops for minutes at a time (Connection timed out /
      # Empty reply). Those outage windows made the checkout below fail (PR #70/#71 needed manual
      # reruns). Wait out a transient outage (~9min patience) so checkout runs while github.com is
      # reachable · then actions/checkout's own 3 retries cover any mid-fetch blip.
      - name: Wait for github.com reachability (dev server flaky network)
        working-directory: ${{ github.workspace }}
        run: |
          for i in $(seq 1 24); do
            if curl -sSf --max-time 8 -o /dev/null https://github.com; then
              echo "github.com reachable (attempt $i)"; exit 0
            fi
            echo "github.com unreachable · waiting 15s (attempt $i/24)"
            sleep 15
          done
          echo "::error::github.com still unreachable after ~9min"; exit 1

      - name: Checkout
        uses: actions/checkout@v4

      # self-hosted runner's ambient PATH has system Node (too old · npm 6 can't read lockfileVersion 3).
      # Prepend the dev server's Node 20 install so npm ci / build use a modern npm.
      - name: Use Node 20 (dev server install)
        run: echo "${{ vars.NODE20_BIN_PATH || '/home/z1/liqiang/tools/node20/bin' }}" >> "$GITHUB_PATH"

      - name: Node version
        run: node -v && npm -v

      - name: Install + build
        run: |
          npm ci
          npm run build

      - name: Unit tests (mocked · feat-061 steps 2/3/6 coverage)
        run: npm run test:unit

      - name: Start server (CI port · NEON_LOCAL_URL active)
        env:
          # only the server process needs the local bypass · keeps it out of the unit-test env
          NEON_LOCAL_URL: 'postgres://cloud_admin:cloud_admin@127.0.0.1:55432/neondb'
        run: |
          mkdir -p .run-logs
          PORT="${CI_PORT}" NEON_LOCAL_URL="${NEON_LOCAL_URL}" nohup npm run start > .run-logs/ci-start.log 2>&1 &
          echo $! > .run-logs/ci-start.pid
          # wait for health (up to ~30s)
          for i in $(seq 1 30); do
            if curl -sS --max-time 3 "${MCP_BASE_URL}/api/health" >/dev/null 2>&1; then
              echo "server up after ${i}s"; exit 0
            fi
            sleep 1
          done
          echo "server did not become healthy" >&2
          cat .run-logs/ci-start.log >&2 || true
          exit 1

      - name: Provision sales fixture (real Neon)
        # source neon-env.sh adds dev-server psql to PATH (per maintainer 2026-05-27)
        run: |
          source /home/z1/liqiang/neon-env.sh
          bash scripts/l1-sales-fixture/setup.sh

      - name: E2e chain checks (real Neon · feat-061 steps 0/B/C/D + listing)
        run: bash scripts/l1-sales-fixture/run-checks.sh

      - name: Playwright e2e (feat-061 step 1 · listing wire-level)
        run: |
          npx playwright install --with-deps chromium || true
          npm run test:e2e:web

      - name: Teardown fixture + stop server (always)
        if: always()
        run: |
          source /home/z1/liqiang/neon-env.sh
          bash scripts/l1-sales-fixture/teardown.sh || true
          PID=$(cat .run-logs/ci-start.pid 2>/dev/null || echo '')
          [ -n "$PID" ] && kill "$PID" 2>/dev/null || true
          # also kill any next-server bound to CI_PORT (pkill may not match · best effort)
          pkill -f "PORT=${CI_PORT}" 2>/dev/null || true
