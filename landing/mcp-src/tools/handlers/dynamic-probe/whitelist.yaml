# dynamic-probe whitelist · feat-068 测试 fixture
# 生产部署用 openneon 仓的 whitelist.yaml (feat-067 PG USDT + feat-069 Rust uprobe 维护)。
# 本文件用于 mcp 测试 + 文档 example · 跟 whitelist.schema.json (anchor #39 mirror) 兼容。
#
# 形状字段:
#   version: integer enum [1]
#   usdt:    USDT 探针清单 (target/probe_name/subsystem 必填)
#   uprobe:  uprobe 探针清单 (binary/symbol/module/type/is_async 必填 · is_async 必须 false)
#   denylist: { usdt_probe_patterns: [regex], uprobe_symbol_patterns: [regex] }
version: 1
usdt:
  - target: postgresql
    probe_name: postgresql:executor__run
    subsystem: executor
    pg_version_min: 14
    pg_version_max: null
    notes: "PG executor run · 查询执行入口 · 单点 (无 retprobe · 配 call_count 等)"
  - target: postgresql
    probe_name: postgresql:lwlock__acquire
    subsystem: lwlock
    pg_version_min: 14
    pg_version_max: null
    notes: "PG LWLock 获取 · 锁竞争分析 · 配 lwlock_contention_top 用 arg0 = lock name"
uprobe:
  - binary: pageserver
    symbol: neon_pageserver::wal_lazy_apply
    module: neon_pageserver
    type: sync_fn
    is_async: false
    notes: "Rust uprobe · WAL lazy apply 路径 · 同步函数 · 可配 latency_buckets / lock_wait_histogram"
  - binary: pageserver
    symbol: neon_pageserver::page_request::handle_get_page_at_lsn
    module: neon_pageserver
    type: method
    is_async: false
    notes: "Neon pageserver page request 入口 · 同步 wrapper"
denylist:
  usdt_probe_patterns:
    - "^postgresql:scram_.*"        # 密码相关
    - ".*__(secret|password)__.*"   # 密钥/口令字段
    - "^postgresql:.*decrypt.*"      # 加密路径
    - "^postgresql:.*authenticate.*" # 认证流程
  uprobe_symbol_patterns:
    - ".*::scram_.*"
    - ".*_secret_.*"
    - ".*password.*"
    - ".*decrypt_.*"
    - ".*AuthenticateUser.*"
